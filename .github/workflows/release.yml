name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_docker:
        description: 'Skip Docker build and push (images already published)'
        type: boolean
        default: false

env:
  REGISTRY: aquarco

jobs:
  # ── 1a. Build per-arch Docker images (native runners) ────────────────────────
  docker-build:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    if: ${{ !inputs.skip_docker }}
    permissions:
      contents: read
    strategy:
      matrix:
        image: [api, web, migrations]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag (strip leading v)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set build context
        id: ctx
        run: |
          case "${{ matrix.image }}" in
            api)        echo "context=./api" >> "$GITHUB_OUTPUT" ;;
            web)        echo "context=./web" >> "$GITHUB_OUTPUT" ;;
            migrations) echo "context=./db"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.ctx.outputs.context }}
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=build-${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image }}-${{ matrix.arch }}

  # ── 1b. Merge per-arch images into multi-arch manifests ──────────────────────
  docker-merge:
    name: Merge ${{ matrix.image }} manifests
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
    strategy:
      matrix:
        image: [api, web, migrations]
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag (strip leading v)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.version }}-amd64 \
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.version }}-arm64

  # ── 2. Create GitHub release ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker-merge
    if: always() && (needs.docker-merge.result == 'success' || needs.docker-merge.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Aquarco ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            --verify-tag

  # ── 3. Build macOS CLI binary and upload to release ───────────────────────────
  build-cli:
    name: Build macOS CLI binary
    runs-on: macos-14
    needs: create-release
    if: always() && needs.create-release.result == 'success'
    permissions:
      contents: write
    outputs:
      sha256: ${{ steps.sha256.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyInstaller and CLI
        run: pip install pyinstaller cli/

      - name: Patch build type to production
        run: |
          sed -i '' \
            's/BUILD_TYPE: str = "development"/BUILD_TYPE: str = "production"/' \
            cli/src/aquarco_cli/_build.py

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onedir \
            --name aquarco \
            cli/src/aquarco_cli/main.py

      - name: Assemble release tarball
        run: |
          STAGING="aquarco-staging"
          mkdir -p "$STAGING"

          # onedir output — fast startup, no per-run extraction
          # Layout: aquarco/aquarco (binary) + aquarco/_internal/ (libs)
          # vagrant/ and other source dirs sit alongside at the same level
          cp -r dist/aquarco "$STAGING/"

          # Source tree needed by the VM via vboxsf synced folder
          cp -r vagrant docker config db supervisor "$STAGING/"
          mkdir -p "$STAGING/logs"

          # Pack — flat layout so `binary "aquarco"` resolves at the top level
          (cd "$STAGING" && tar -czf ../aquarco-macos-arm64.tar.gz *)

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" aquarco-macos-arm64.tar.gz

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 aquarco-macos-arm64.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

  # ── 4. Publish Homebrew cask to tap ──────────────────────────────────────────
  homebrew:
    name: Publish Homebrew cask
    runs-on: ubuntu-latest
    needs: build-cli
    if: always() && needs.build-cli.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Stamp tag and SHA256 in cask
        run: |
          sed -i \
            -e 's|PLACEHOLDER_TAG|${{ github.ref_name }}|' \
            -e 's|sha256 "PLACEHOLDER_SHA256"|sha256 "${{ needs.build-cli.outputs.sha256 }}"|' \
            homebrew/aquarco.rb

      - name: Push cask to homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/aquarco/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Casks
          cp homebrew/aquarco.rb /tmp/tap/Casks/aquarco.rb
          cd /tmp/tap
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          # Remove old formula if it exists
          git rm --ignore-unmatch Formula/aquarco.rb
          git add Casks/aquarco.rb
          git commit -m "Update aquarco to ${{ github.ref_name }}"
          git push

  # ── 5. Smoke-test the released binary ────────────────────────────────────────
  test-cask:
    name: Smoke test released binary
    runs-on: macos-14
    needs: homebrew
    if: always() && needs.homebrew.result == 'success'
    steps:
      - name: Download release tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern 'aquarco-macos-arm64.tar.gz' \
            --repo aquarco/aquarco

      - name: Assert version matches tag
        run: |
          tar -xzf aquarco-macos-arm64.tar.gz
          got=$(./aquarco/aquarco --version)
          expected="aquarco ${GITHUB_REF_NAME#v}"
          echo "got:      $got"
          echo "expected: $expected"
          [ "$got" = "$expected" ]

  # ── 6. Smoke-test the Homebrew cask ──────────────────────────────────────────
  test-homebrew-cask:
    name: Smoke test Homebrew cask
    runs-on: macos-14
    needs: test-cask
    if: always() && needs.test-cask.result == 'success'
    steps:
      - name: Tap and install cask
        run: |
          brew tap aquarco/tap
          brew install --cask aquarco

      - name: Assert version matches tag
        run: |
          got=$(aquarco --version)
          expected="aquarco ${GITHUB_REF_NAME#v}"
          echo "got:      $got"
          echo "expected: $expected"
          [ "$got" = "$expected" ]
