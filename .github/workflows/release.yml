name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: aquarco

jobs:
  # ── 1. Build and push Docker images ──────────────────────────────────────────
  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag (strip leading v)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/api:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/web:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Migrations image
        uses: docker/build-push-action@v5
        with:
          context: ./db
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/migrations:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Create GitHub release ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Aquarco ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            --verify-tag

  # ── 3. Build macOS CLI binary and upload to release ───────────────────────────
  build-cli:
    name: Build macOS CLI binary
    runs-on: macos-14
    needs: create-release
    permissions:
      contents: write
    outputs:
      sha256: ${{ steps.sha256.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller and CLI
        run: pip install pyinstaller cli/

      - name: Patch build type to production
        run: |
          sed -i '' \
            's/BUILD_TYPE: str = "development"/BUILD_TYPE: str = "production"/' \
            cli/src/aquarco_cli/_build.py

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onedir \
            --name aquarco \
            cli/src/aquarco_cli/main.py

      - name: Assemble release tarball
        run: |
          STAGING="aquarco-staging"
          mkdir -p "$STAGING"

          # onedir output — fast startup, no per-run extraction
          # Layout: aquarco/aquarco (binary) + aquarco/_internal/ (libs)
          # vagrant/ and other source dirs sit alongside at the same level
          cp -r dist/aquarco "$STAGING/"

          # Source tree needed by the VM via vboxsf synced folder
          cp -r vagrant docker config db supervisor "$STAGING/"
          mkdir -p "$STAGING/logs"

          # Pack — flat layout so `binary "aquarco"` resolves at the top level
          (cd "$STAGING" && tar -czf ../aquarco-macos-arm64.tar.gz *)

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" aquarco-macos-arm64.tar.gz

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 aquarco-macos-arm64.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

  # ── 4. Publish Homebrew cask to tap ──────────────────────────────────────────
  homebrew:
    name: Publish Homebrew cask
    runs-on: ubuntu-latest
    needs: build-cli
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Stamp tag and SHA256 in cask
        run: |
          sed -i \
            -e 's|PLACEHOLDER_TAG|${{ github.ref_name }}|' \
            -e 's|sha256 "PLACEHOLDER_SHA256"|sha256 "${{ needs.build-cli.outputs.sha256 }}"|' \
            homebrew/aquarco.rb

      - name: Push cask to homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/aquarco/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Casks
          cp homebrew/aquarco.rb /tmp/tap/Casks/aquarco.rb
          cd /tmp/tap
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          # Remove old formula if it exists
          git rm --ignore-unmatch Formula/aquarco.rb
          git add Casks/aquarco.rb
          git commit -m "Update aquarco to ${{ github.ref_name }}"
          git push
