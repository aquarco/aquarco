name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: aquarco

jobs:
  # ── 1. Build and push Docker images ──────────────────────────────────────────
  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag (strip leading v)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ env.REGISTRY }}/api:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ env.REGISTRY }}/web:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Migrations image
        uses: docker/build-push-action@v5
        with:
          context: ./db
          push: true
          tags: ${{ env.REGISTRY }}/migrations:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Create GitHub release and publish Homebrew formula ────────────────────
  homebrew:
    name: Publish Homebrew formula
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Aquarco ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            --verify-tag

      - name: Compute SHA256 of release tarball
        id: sha256
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Stamp SHA256 in formula
        run: |
          sed -i 's|sha256 "PLACEHOLDER_SHA256"|sha256 "${{ steps.sha256.outputs.sha256 }}"|' homebrew/aquarco.rb

      - name: Push formula to homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/aquarco/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp homebrew/aquarco.rb /tmp/tap/Formula/aquarco.rb
          cd /tmp/tap
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          git add Formula/aquarco.rb
          git commit -m "Update aquarco to ${{ github.ref_name }}"
          git push
