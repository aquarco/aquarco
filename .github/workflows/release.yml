name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to target (e.g. v1.0.0rc1)'
        type: string
        required: true
      skip_docker:
        description: 'Skip Docker build and push (images already published)'
        type: boolean
        default: false

env:
  REGISTRY: aquarco
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # ── 1. Build and push Docker images ──────────────────────────────────────────
  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_docker }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag (strip leading v)
        id: version
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/api:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/web:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Migrations image
        uses: docker/build-push-action@v7
        with:
          context: ./db
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/migrations:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Create GitHub release ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    if: always() && (needs.docker.result == 'success' || needs.docker.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "Aquarco ${{ env.RELEASE_TAG }}" \
            --notes "Release ${{ env.RELEASE_TAG }}" \
            --verify-tag

  # ── 3. Build macOS CLI binary and upload to release ───────────────────────────
  build-cli:
    name: Build macOS CLI binary
    runs-on: macos-14
    needs: create-release
    permissions:
      contents: write
    outputs:
      sha256: ${{ steps.sha256.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyInstaller and CLI
        run: pip install pyinstaller cli/

      - name: Patch build type to production
        run: |
          sed -i '' \
            's/BUILD_TYPE: str = "development"/BUILD_TYPE: str = "production"/' \
            cli/src/aquarco_cli/_build.py

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onedir \
            --name aquarco \
            cli/src/aquarco_cli/main.py

      - name: Assemble release tarball
        run: |
          STAGING="aquarco-staging"
          mkdir -p "$STAGING"

          # onedir output — fast startup, no per-run extraction
          # Layout: aquarco/aquarco (binary) + aquarco/_internal/ (libs)
          # vagrant/ and other source dirs sit alongside at the same level
          cp -r dist/aquarco "$STAGING/"

          # Source tree needed by the VM via vboxsf synced folder
          cp -r vagrant docker config db supervisor "$STAGING/"
          mkdir -p "$STAGING/logs"

          # Pack — flat layout so `binary "aquarco"` resolves at the top level
          (cd "$STAGING" && tar -czf ../aquarco-macos-arm64.tar.gz *)

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.RELEASE_TAG }}" aquarco-macos-arm64.tar.gz

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 aquarco-macos-arm64.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

  # ── 4. Publish Homebrew cask to tap ──────────────────────────────────────────
  homebrew:
    name: Publish Homebrew cask
    runs-on: ubuntu-latest
    needs: build-cli
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Stamp tag and SHA256 in cask
        run: |
          sed -i \
            -e 's|PLACEHOLDER_TAG|${{ env.RELEASE_TAG }}|' \
            -e 's|sha256 "PLACEHOLDER_SHA256"|sha256 "${{ needs.build-cli.outputs.sha256 }}"|' \
            homebrew/aquarco.rb

      - name: Push cask to homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/aquarco/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Casks
          cp homebrew/aquarco.rb /tmp/tap/Casks/aquarco.rb
          cd /tmp/tap
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          # Remove old formula if it exists
          git rm --ignore-unmatch Formula/aquarco.rb
          git add Casks/aquarco.rb
          git commit -m "Update aquarco to ${{ env.RELEASE_TAG }}"
          git push

  # ── 5. Smoke-test the installed Homebrew cask ─────────────────────────────────
  test-cask:
    name: Smoke test Homebrew cask
    runs-on: macos-14
    needs: homebrew
    timeout-minutes: 40
    steps:
      - name: Tap and install cask
        run: |
          brew tap aquarco/tap
          brew install --cask aquarco

      - name: Provision VM
        run: aquarco init
        timeout-minutes: 25

      - name: Assert status returns healthy JSON
        run: |
          output=$(aquarco status --json)
          echo "$output"
          echo "$output" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'dashboardStats' in d, f'unexpected response: {d}'
          stats = d['dashboardStats']
          assert 'totalTasks' in stats, f'missing totalTasks: {stats}'
          print('OK — all services running')
          "
