apiVersion: aifishtank.supervisor/v1
kind: SupervisorConfig

metadata:
  name: aifishtank-supervisor
  version: "1.0.0"

spec:
  workdir: /home/agent/ai-fishtank
  agentsDir: /home/agent/ai-fishtank/config/agents/definitions
  promptsDir: /home/agent/ai-fishtank/config/agents/prompts
  pipelinesFile: /home/agent/ai-fishtank/config/pipelines.yaml

  database:
    url: postgresql://aifishtank:aifishtank@localhost:5432/aifishtank
    maxConnections: 5

  logging:
    level: info
    file: /var/log/aifishtank/supervisor.log
    maxSizeMB: 100
    maxFiles: 5
    format: json

  globalLimits:
    maxConcurrentAgents: 3
    maxTokensPerHour: 1000000
    cooldownBetweenTasksSeconds: 5
    maxRetries: 3
    retryDelaySeconds: 60

  configReload:
    signal: SIGHUP
    validateBeforeReload: true

  repoConfig:
    autoReload: true
    configFile: .aifishtank.yaml

  pollers:
    - name: github-tasks
      type: github-tasks
      enabled: true
      intervalSeconds: 60
      config:
        repositories: all
        sources:
          - type: issues
            labels: [agent-task]
            states: [open]
        categorization:
          defaultCategory: analyze
          labelMapping:
            bug: implementation
            feature: analyze
            docs: docs
            test: test
            review-needed: review
            design-needed: design

    - name: github-source
      type: github-source
      enabled: true
      intervalSeconds: 30
      config:
        repositories: all
        watch:
          - type: pull_request
            states: [open]
        triggers:
          pr_opened: [review]
          pr_updated: [review]

    - name: external-triggers
      type: file-watch
      enabled: true
      intervalSeconds: 10
      config:
        watchDir: /var/lib/aifishtank/triggers
        processedDir: /var/lib/aifishtank/triggers/processed

  health:
    enabled: true
    reportIntervalMinutes: 30
    reportDestination: github-issue
    issueNumber: 1

  secrets:
    githubTokenFile: /home/agent/.ssh/github-token
    anthropicKeyFile: /home/agent/.anthropic-key
