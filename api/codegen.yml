overwrite: true
schema: "src/schema.graphql"
generates:
  src/generated/types.ts:
    plugins:
      - typescript
      - typescript-resolvers
    config:
      useIndexSignature: true
      contextType: "../context.js#Context"
      scalars:
        DateTime: string
        JSON: unknown
      enumValues:
        TaskStatus:
          PENDING: pending
          QUEUED: queued
          PLANNING: planning
          EXECUTING: executing
          COMPLETED: completed
          FAILED: failed
          TIMEOUT: timeout
          CANCELLED: cancelled
          BLOCKED: blocked
          RATE_LIMITED: rate_limited
          CLOSED: closed
        StageStatus:
          PENDING: pending
          EXECUTING: executing
          COMPLETED: completed
          FAILED: failed
          SKIPPED: skipped
          RATE_LIMITED: rate_limited
          MAX_TURNS: max_turns
        CloneStatus:
          PENDING: pending
          CLONING: cloning
          READY: ready
          ERROR: error
