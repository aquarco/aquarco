scalar DateTime
scalar JSON

type Query {
  # Tasks
  tasks(status: TaskStatus, repository: String, limit: Int, offset: Int): TaskConnection!
  task(id: ID!): Task

  # Repositories
  repositories: [Repository!]!
  repository(name: String!): Repository

  # Agent instances
  agentInstances: [AgentInstance!]!

  # Agent definitions (grouped by source)
  globalAgents: [AgentDefinition!]!

  # Pipeline status
  pipelineStatus(taskId: ID!): PipelineStatus

  # Pipeline definitions
  pipelineDefinitions: [PipelineDefinition!]!

  # GitHub auth
  githubAuthStatus: GithubAuthStatus!
  githubRepositories: [GithubRepo!]!
  githubBranches(owner: String!, repo: String!): [String!]!

  # Claude auth
  claudeAuthStatus: ClaudeAuthStatus!

  # Dashboard stats
  dashboardStats: DashboardStats!

  # Token usage chart data
  tokenUsageByModel(days: Int): [TokenUsageByDay!]!

  # Supervisor drain mode
  drainStatus: DrainStatus!
}

type Mutation {
  # Task management
  createTask(input: CreateTaskInput!): TaskPayload!
  updateTaskStatus(id: ID!, status: TaskStatus!): TaskPayload!
  retryTask(id: ID!): TaskPayload!
  rerunTask(id: ID!): TaskPayload!
  closeTask(id: ID!): TaskPayload!
  cancelTask(id: ID!): TaskPayload!

  # Repository management
  registerRepository(input: RegisterRepositoryInput!): RepositoryPayload!
  removeRepository(name: String!): RepositoryPayload!

  # GitHub auth
  githubLoginStart: GithubDeviceCode!
  githubLoginPoll: GithubLoginResult!
  githubLogout: Boolean!

  # Claude auth
  claudeLoginStart: ClaudeLoginStart!
  claudeLoginPoll: ClaudeLoginResult!
  claudeSubmitCode(code: String!): ClaudeLoginResult!
  claudeLogout: Boolean!

  # Supervisor drain mode
  setDrainMode(enabled: Boolean!): DrainStatus!

  # Repository actions
  retryClone(name: String!): RepositoryPayload!
  setConfigRepo(name: String!, isConfigRepo: Boolean!): RepositoryPayload!

  # Intervention
  unblockTask(id: ID!, resolution: String!): TaskPayload!

  # Agent overrides
  setAgentDisabled(name: String!, scope: String!, disabled: Boolean!): AgentDefinitionPayload!
  modifyAgent(name: String!, scope: String!, spec: JSON!): AgentDefinitionPayload!
  resetAgentModification(name: String!, scope: String!): AgentDefinitionPayload!
  createAgentPR(repoName: String!): CreatePRPayload!
}

type Subscription {
  taskUpdated(repository: String): Task!
  pipelineProgress(taskId: ID!): PipelineStatus!
}

# --- Types ---

type Task {
  id: ID!
  title: String!
  status: TaskStatus!
  priority: Int!
  source: String!
  sourceRef: String
  pipeline: String!
  pipelineVersion: String
  repository: Repository!
  initialContext: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
  startedAt: DateTime
  completedAt: DateTime
  lastCompletedStageId: Int
  checkpointData: JSON
  retryCount: Int!
  errorMessage: String
  parentTaskId: ID
  prNumber: Int
  branchName: String
  totalCostUsd: Float
  totalTokens: Int
  stages: [Stage!]!
  context: [ContextEntry!]!
}

type Stage {
  id: ID!
  taskId: ID!
  stageNumber: Int!
  iteration: Int!
  run: Int!
  category: String!
  agent: String
  agentVersion: String
  status: StageStatus!
  startedAt: DateTime
  completedAt: DateTime
  structuredOutput: JSON
  rawOutput: String
  tokensInput: Int
  tokensOutput: Int
  costUsd: Float
  cacheReadTokens: Int
  cacheWriteTokens: Int
  model: String
  errorMessage: String
  retryCount: Int!
  liveOutput: String
}

type Repository {
  name: String!
  url: String!
  branch: String
  cloneDir: String!
  pollers: [String!]!
  isConfigRepo: Boolean!
  lastClonedAt: DateTime
  lastPulledAt: DateTime
  cloneStatus: CloneStatus!
  headSha: String
  errorMessage: String
  deployPublicKey: String
  taskCount: Int!
  hasClaudeAgents: Boolean!
}

type AgentInstance {
  agentName: String!
  activeCount: Int!
  totalExecutions: Int!
  totalTokensUsed: Int!
  lastExecutionAt: DateTime
}

type ContextEntry {
  id: ID!
  taskId: ID!
  stageNumber: Int
  key: String!
  valueType: String!
  valueJson: JSON
  valueText: String
  valueFileRef: String
  createdAt: DateTime!
}

type PipelineStatus {
  taskId: ID!
  pipeline: String
  lastCompletedStageId: Int
  totalStages: Int!
  stages: [Stage!]!
  status: TaskStatus!
}

type DashboardStats {
  totalTasks: Int!
  pendingTasks: Int!
  executingTasks: Int!
  completedTasks: Int!
  failedTasks: Int!
  blockedTasks: Int!
  activeAgents: Int!
  totalTokensToday: Int!
  totalCostToday: Float!
  tasksByPipeline: [PipelineCount!]!
  tasksByRepository: [RepositoryCount!]!
}

type PipelineCount {
  pipeline: String!
  count: Int!
}

type RepositoryCount {
  repository: String!
  count: Int!
}

type TokenUsageByDay {
  day: DateTime!
  model: String!
  tokensInput: Int!
  tokensOutput: Int!
  cacheReadTokens: Int!
  cacheWriteTokens: Int!
}

type TaskConnection {
  nodes: [Task!]!
  totalCount: Int!
}

# --- Payloads ---

type TaskPayload {
  task: Task
  errors: [Error!]
}

type RepositoryPayload {
  repository: Repository
  errors: [Error!]
}

type Error {
  field: String
  message: String!
}

# --- Inputs ---

input CreateTaskInput {
  title: String!
  repository: String!
  source: String!
  sourceRef: String
  pipeline: String
  priority: Int
  initialContext: JSON
}

input RegisterRepositoryInput {
  name: String!
  url: String!
  branch: String
  cloneDir: String
  pollers: [String!]
  isConfigRepo: Boolean
}

# --- Enums ---

enum TaskStatus {
  PENDING
  QUEUED
  PLANNING
  EXECUTING
  COMPLETED
  FAILED
  TIMEOUT
  BLOCKED
  RATE_LIMITED
  CLOSED
}

enum StageStatus {
  PENDING
  EXECUTING
  COMPLETED
  FAILED
  SKIPPED
  RATE_LIMITED
}

# --- GitHub Auth ---

type GithubAuthStatus {
  authenticated: Boolean!
  username: String
}

type GithubDeviceCode {
  userCode: String!
  verificationUri: String!
  expiresIn: Int!
}

type GithubLoginResult {
  success: Boolean!
  username: String
  error: String
}

# --- Claude Auth ---

type ClaudeAuthStatus {
  authenticated: Boolean!
  email: String
}

type ClaudeLoginStart {
  authorizeUrl: String!
  expiresIn: Int!
}

type ClaudeLoginResult {
  success: Boolean!
  email: String
  error: String
}

type GithubRepo {
  nameWithOwner: String!
  url: String!
  defaultBranch: String!
  isPrivate: Boolean!
  description: String
}

enum CloneStatus {
  PENDING
  CLONING
  READY
  ERROR
}

# --- Agent Definitions ---

enum AgentSource {
  DEFAULT
  GLOBAL_CONFIG
  REPOSITORY
  AUTOLOADED
}

enum AgentGroup {
  SYSTEM
  PIPELINE
}

type AgentDefinition {
  name: String!
  version: String!
  description: String!
  source: AgentSource!
  sourceRepo: String
  group: AgentGroup!
  spec: JSON!
  isDisabled: Boolean!
  isModified: Boolean!
  modifiedSpec: JSON
  activeCount: Int!
  totalExecutions: Int!
  totalTokensUsed: Int!
  lastExecutionAt: DateTime
}

type AgentDefinitionPayload {
  agent: AgentDefinition
  errors: [Error!]
}

type CreatePRPayload {
  prUrl: String
  errors: [Error!]
}

# --- Pipeline Definitions ---

type PipelineDefinition {
  name: String!
  version: String!
  stages: [PipelineStageDefinition!]!
  categories: JSON
}

type PipelineStageDefinition {
  name: String!
  category: String!
  required: Boolean!
  conditions: [PipelineCondition!]!
}

type DrainStatus {
  enabled: Boolean!
  activeAgents: Int!
  activeTasks: Int!
}

type PipelineCondition {
  type: String!
  expression: String!
  onYes: String
  onNo: String
  maxRepeats: Int
}
