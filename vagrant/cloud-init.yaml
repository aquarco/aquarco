#cloud-config
# Aquarco VM — Cloud-Init base configuration
# Used by Vagrant (ubuntu/noble64 box) for initial OS setup.
# This runs before provision.sh and handles the lowest-level bootstrapping.
# See tasks/TASK-001-virtualbox-sandbox-architecture.md for architecture context.

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - jq
  - wget
  - unzip
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common
  - docker.io
  - docker-compose-plugin
  - postgresql-client
  - dnsmasq
  - conntrack
  - iptables-persistent
  - netfilter-persistent
  - rsync
  - cron

users:
  - name: agent
    gecos: "Aquarco Agent"
    groups:
      - docker
      - sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    # SSH keys are not pre-loaded; generated by setup-secrets.sh
    ssh_authorized_keys: []
    lock_passwd: true

write_files:
  # dnsmasq DNS query logging config (provision.sh will overwrite with the full version)
  - path: /etc/dnsmasq.d/aquarco-tracking.conf
    owner: root:root
    permissions: "0644"
    content: |
      # Aquarco DNS tracking — initial cloud-init placeholder
      # Replaced by vagrant/scripts/setup-network-tracking.sh during provision
      log-queries=extra
      log-facility=/var/log/aquarco/dns-queries.log
      server=8.8.8.8
      server=1.1.1.1
      cache-size=1000

  # aquarco directory structure marker
  - path: /var/lib/aquarco/.initialized
    owner: root:root
    permissions: "0644"
    content: |
      Aquarco data directory — created by cloud-init

  # Placeholder secrets env (filled by setup-secrets.sh)
  - path: /etc/aquarco/secrets.env
    owner: root:root
    permissions: "0600"
    content: |
      # Aquarco secrets — managed by vagrant/scripts/setup-secrets.sh
      # Run: sudo /home/agent/aquarco/vagrant/scripts/setup-secrets.sh
      GITHUB_TOKEN=PLACEHOLDER
      ANTHROPIC_API_KEY=PLACEHOLDER

runcmd:
  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Create log and data directories
  - mkdir -p /var/log/aquarco /var/log/aquarco/agents /var/log/aquarco-export
  - mkdir -p /var/lib/aquarco/triggers /var/lib/aquarco/triggers/processed /var/lib/aquarco/blobs
  - mkdir -p /etc/aquarco
  - chown -R agent:agent /var/log/aquarco
  - chmod 700 /etc/aquarco

  # Enable dnsmasq (provision.sh configures it fully)
  - systemctl enable dnsmasq

  # Persist empty iptables rules base (provision.sh adds logging rules)
  - netfilter-persistent save

  # Ensure agent home directories exist
  - mkdir -p /home/agent/repos /home/agent/config /home/agent/system
  - chown -R agent:agent /home/agent
