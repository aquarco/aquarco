apiVersion: aquarco.agents/v1
kind: AgentDefinition
metadata:
  name: implementation-agent
  version: "1.0.0"
  description: "Implements features and bug fixes by writing and modifying code"
  labels:
    team: platform
    domain: implementation

spec:
  model: opus

  categories:
    - implement

  priority: 10

  promptFile:  ../../prompts/implementation-agent.md

  tools:
    allowed:
      - Read
      - Write
      - Edit
      - Bash
      - Grep
      - Glob

  resources:
    maxTokens: 200000
    timeoutMinutes: 60
    maxConcurrent: 1
    maxTurns: 100
    maxCost: 15.0

  environment:
    AGENT_MODE: "implementation"

  conditions:
    filePatterns:
      - "src/**"
      - "lib/**"
      - "packages/**"

  healthCheck:
    enabled: true
    intervalSeconds: 300
