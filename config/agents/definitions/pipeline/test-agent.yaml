apiVersion: aquarco.agents/v1
kind: AgentDefinition
metadata:
  name: test-agent
  version: "1.0.0"
  description: "Writes and runs tests, reports coverage, and validates implementation correctness"
  labels:
    team: platform
    domain: testing

spec:
  model: opus

  categories:
    - test

  priority: 10

  promptFile:  ../../prompts/test-agent.md

  tools:
    allowed:
      - Read
      - Write
      - Edit
      - Bash
      - Grep
      - Glob

  resources:
    maxTokens: 100000
    timeoutMinutes: 45
    maxConcurrent: 2
    maxTurns: 50
    maxCost: 5.0

  environment:
    AGENT_MODE: "test"

  healthCheck:
    enabled: true
    intervalSeconds: 300
