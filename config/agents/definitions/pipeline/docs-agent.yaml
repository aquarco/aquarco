apiVersion: aquarco.agents/v1
kind: AgentDefinition
metadata:
  name: docs-agent
  version: "1.0.0"
  description: "Keeps documentation current: README, CHANGELOG, API docs, and inline comments"
  labels:
    team: platform
    domain: documentation

spec:
  categories:
    - docs

  priority: 20

  promptFile: docs-agent.md

  tools:
    allowed:
      - Read
      - Write
      - Edit
      - Grep
      - Glob

  resources:
    maxTokens: 80000
    timeoutMinutes: 30
    maxConcurrent: 1
    maxTurns: 30
    maxCost: 2.0

  environment:
    AGENT_MODE: "docs"

  conditions:
    filePatterns:
      - "src/**"
      - "lib/**"
      - "packages/**"
      - "api/**"

  healthCheck:
    enabled: true
    intervalSeconds: 300
