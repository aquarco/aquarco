apiVersion: aquarco.agents/v1
kind: AgentDefinition
metadata:
  name: condition-evaluator-agent
  version: "1.0.0"
  description: "Evaluates pipeline exit-gate conditions by answering yes/no questions about stage outputs"
  labels:
    team: platform
    domain: orchestration

spec:
  model: haiku

  role: condition-evaluator

  promptFile:  ../../prompts/condition-evaluator-agent.md

  # tools.allowed: [] means "no tools whitelisted" — the CLI wrapper MUST
  # omit --allowedTools when the list is empty (treating it as "unset / all
  # allowed") OR must pass an explicit empty allow-list to disable tool use.
  # The intent here is no tool access (maxTurns: 1, text-only evaluation).
  # See cli/claude.py for how an empty allowed list is handled.
  tools:
    allowed: []
    denied: []

  resources:
    maxTokens: 10000
    timeoutMinutes: 2
    maxConcurrent: 5
    maxTurns: 10
    maxCost: 1.0

  environment:
    AGENT_MODE: "condition-evaluation"

  healthCheck:
    enabled: false
