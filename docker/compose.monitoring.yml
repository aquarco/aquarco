name: aquarco-monitoring

networks:
  default:
    name: aquarco-monitoring
  aquarco:
    external: true
    name: aquarco_aquarco

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

services:

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:${AQUARCO_PROMETHEUS_VERSION:-v3.11.2}
    restart: unless-stopped
    networks:
      - default
      - aquarco
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost:8080/prometheus'
      - '--web.route-prefix=/prometheus'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/prometheus/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana ───────────────────────────────────────────────────────────────────
  # Runs on port 3000 — separate from the Aquarco web UI (port 8080).
  grafana:
    image: grafana/grafana:${AQUARCO_GRAFANA_VERSION:-13.0.1}
    restart: unless-stopped
    networks:
      - default
      - aquarco
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_SERVER_ROOT_URL: "http://localhost:8080/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/grafana/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Loki ──────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:${AQUARCO_LOKI_VERSION:-3.7.1}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki_data:/loki
      - ../monitoring/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
