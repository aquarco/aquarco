# compose.prod.yml — standalone production VM stack for Aquarco
#
# Self-contained: does NOT require compose.yml as a base.
# Uses pre-built images only — no build contexts, no source mounts.
#
# Usage:
#   docker compose -f docker/compose.prod.yml up -d
#
# Required env vars (set in /etc/aquarco/env or export in shell):
#   AQUARCO_REGISTRY         — image registry prefix
#   AQUARCO_MIGRATIONS_VERSION
#   AQUARCO_API_VERSION
#   AQUARCO_WEB_VERSION
#   POSTGRES_USER
#   POSTGRES_PASSWORD
#   DATABASE_URL             — full postgres connection string

name: aquarco

networks:
  aquarco:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:${AQUARCO_POSTGRES_VERSION:-16-alpine}
    restart: unless-stopped
    networks:
      - aquarco
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-aquarco}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aquarco}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Database Migrations (yoyo) ────────────────────────────────────────────────
  migrations:
    image: ${AQUARCO_REGISTRY}/migrations:${AQUARCO_MIGRATIONS_VERSION:?AQUARCO_MIGRATIONS_VERSION must be set}
    restart: "no"
    networks:
      - aquarco
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
    depends_on:
      postgres:
        condition: service_healthy

  # ── GraphQL API ───────────────────────────────────────────────────────────────
  api:
    image: ${AQUARCO_REGISTRY}/api:${AQUARCO_API_VERSION:?AQUARCO_API_VERSION must be set}
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    networks:
      - aquarco
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ${AGENT_SSH_DIR:-/home/agent/.ssh}:/agent-ssh
      - ${REPOS_BASE:-/home/agent/repos}:/repos
      - /var/lib/aquarco/claude-ipc:/claude-ipc
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      NODE_ENV: production
      PORT: ${PORT:-4000}
      REPOS_BASE: ${REPOS_BASE:-/home/agent/repos}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      migrations:
        condition: service_completed_successfully

  # ── Web UI (Next.js) ──────────────────────────────────────────────────────────
  web:
    image: ${AQUARCO_REGISTRY}/web:${AQUARCO_WEB_VERSION:?AQUARCO_WEB_VERSION must be set}
    restart: unless-stopped
    command: ["node", "server.js"]
    networks:
      - aquarco
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/graphql}
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
  
  # ── Adminer (DB UI) ────────────────────────────────────────────────────────
  # Adminer is intentionally included in production. It ships with its own
  # PostgreSQL login screen — valid credentials are required to access any data.
  # No additional authentication layer (e.g. HTTP basic auth) is needed.
  adminer:
    image: adminer:${AQUARCO_ADMINER_VERSION:-5}
    restart: unless-stopped
    networks:
      - aquarco
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  # ── Caddy Reverse Proxy ─────────────────────────────────────────────────────
  caddy:
    image: caddy:${AQUARCO_CADDY_VERSION:-2-alpine}
    restart: unless-stopped
    networks:
      - aquarco
    ports:
      - "8080:8080"
      - "127.0.0.1:2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
