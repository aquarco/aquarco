name: aquarco

# Dev overrides — merged on top of compose.yml via:
#   docker compose -f docker/compose.yml -f docker/compose.dev.yml up

services:

  # Verbose query logging for postgres in dev
  postgres:
    command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]

  # Expose Node.js inspector port for API debugging
  api:
    ports:
      - "127.0.0.1:9229:9229"    # Node.js inspector (attach VS Code / Chrome DevTools)
    environment:
      DEBUG: "*"

  # ── Adminer — lightweight DB admin UI ────────────────────────────────────────
  adminer:
    image: adminer:4
    restart: unless-stopped
    networks:
      - aquarco
    # No external ports — Caddy reverse proxy handles routing via /adminer/*
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy
