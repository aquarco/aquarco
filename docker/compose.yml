name: aquarco

networks:
  aquarco:
    driver: bridge

volumes:
  pgdata:
  api_modules:
  web_modules:
  caddy_data:
  caddy_config:

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - aquarco
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aquarco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aquarco}
      POSTGRES_DB: ${POSTGRES_DB:-aquarco}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aquarco}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Database Migrations (yoyo) ────────────────────────────────────────────────
  migrations:
    build:
      context: ../db
    restart: "no"
    networks:
      - aquarco
    volumes:
      - ../db/migrations:/db/migrations
      - ../db/yoyo.ini:/db/yoyo.ini
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aquarco}:${POSTGRES_PASSWORD:-aquarco}@postgres:5432/${POSTGRES_DB:-aquarco}
    depends_on:
      postgres:
        condition: service_healthy

  # ── GraphQL API ───────────────────────────────────────────────────────────────
  api:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run codegen && npm run dev"
    networks:
      - aquarco
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ../api/src:/app/src
      - ../api/package.json:/app/package.json
      - ../api/tsconfig.json:/app/tsconfig.json
      - ../api/codegen.yml:/app/codegen.yml
      - api_modules:/app/node_modules
      - ${AGENT_SSH_DIR:-/home/agent/.ssh}:/agent-ssh
      - ${REPOS_BASE:-/home/agent/repos}:/repos
      - /var/lib/aquarco/claude-ipc:/claude-ipc
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://aquarco:aquarco@postgres:5432/aquarco}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4000}
      REPOS_BASE: ${REPOS_BASE:-/home/agent/repos}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      migrations:
        condition: service_completed_successfully

  # ── Web UI (Next.js) ──────────────────────────────────────────────────────────
  web:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    networks:
      - aquarco
    # No external ports — Caddy reverse proxy handles routing
    volumes:
      - ../web/src:/app/src
      - ../web/public:/app/public
      - ../web/package.json:/app/package.json
      - ../web/tsconfig.json:/app/tsconfig.json
      - ../web/next.config.js:/app/next.config.js
      - web_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/graphql}
      NODE_ENV: ${NODE_ENV:-development}
      WATCHPACK_POLLING: "true"
    depends_on:
      - api

  # ── Caddy Reverse Proxy ─────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - aquarco
    ports:
      - "8080:8080"
      - "127.0.0.1:2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
