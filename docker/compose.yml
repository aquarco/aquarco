name: aquarco

networks:
  aquarco:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:${◊AQUARCO_POSTGRES_VERSION:-18-alpine}
    restart: unless-stopped
    networks:
      - aquarco
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aquarco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is not set — source /etc/aquarco/docker-secrets.env}
      POSTGRES_DB: ${POSTGRES_DB:-aquarco}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aquarco}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Database Migrations (yoyo) ────────────────────────────────────────────────
  migrations:
    build:
      context: ../db
    restart: "no"
    networks:
      - aquarco
    volumes:
      - ../db/migrations:/db/migrations
      - ../db/yoyo.ini:/db/yoyo.ini
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aquarco}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is not set — source /etc/aquarco/docker-secrets.env}@postgres:5432/${POSTGRES_DB:-aquarco}
    depends_on:
      postgres:
        condition: service_healthy

  # ── GraphQL API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ../api
      target: dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm run codegen && npm run dev"
    networks:
      - aquarco
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ../api/src:/app/src
      - ../api/tsconfig.json:/app/tsconfig.json
      - ../api/codegen.yml:/app/codegen.yml
      - ${AGENT_SSH_DIR:-/home/agent/.ssh}:/agent-ssh
      - ${REPOS_BASE:-/home/agent/repos}:/repos
      - /var/lib/aquarco/claude-ipc:/claude-ipc
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is not set — source /etc/aquarco/docker-secrets.env}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4000}
      REPOS_BASE: ${REPOS_BASE:-/home/agent/repos}
      CHOKIDAR_USEPOLLING: "true"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      migrations:
        condition: service_completed_successfully

  # ── Web UI (Next.js) ──────────────────────────────────────────────────────────
  web:
    build:
      context: ../web
      target: dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm run dev"
    networks:
      - aquarco
    # No external ports — Caddy reverse proxy handles routing
    volumes:
      - ../web/src:/app/src
      - ../web/public:/app/public
      - ../web/tsconfig.json:/app/tsconfig.json
      - ../web/next.config.js:/app/next.config.js
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/graphql}
      NODE_ENV: ${NODE_ENV:-development}
      WATCHPACK_POLLING: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy

  # ── Caddy Reverse Proxy ─────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - aquarco
    ports:
      - "8080:8080"
      - "127.0.0.1:2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Adminer (DB UI) ────────────────────────────────────────────────────────
  adminer:
    image: adminer:${AQUARCO_ADMINER_VERSION:-5}
    restart: unless-stopped
    networks:
      - aquarco
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
